name: OSV-Scanner PR Scan

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-pr:
    name: Scan pull request dependencies
    continue-on-error: true
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8
    with:
      fail-on-vuln: false
