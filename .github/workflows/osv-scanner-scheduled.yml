name: OSV-Scanner Scheduled Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: "43 8 * * 2"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan-scheduled:
    name: Scan dependencies
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
